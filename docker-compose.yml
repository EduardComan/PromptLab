version: '3.8'

services:
  postgres:
    image: postgres:13-alpine
    container_name: promptlab-postgres
    environment:
      POSTGRES_USER: promptlab
      POSTGRES_PASSWORD: promptlab_password
      POSTGRES_DB: prompt_management_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U promptlab"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - promptlab-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: promptlab-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DATABASE_URL=postgresql://promptlab:promptlab_password@postgres:5432/prompt_management_db
      - JWT_SECRET=your_super_secret_jwt_token_key
      - JWT_EXPIRATION=7d
      - CORS_ORIGIN=http://localhost:3000
      - LOG_LEVEL=debug
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - promptlab-network
    restart: unless-stopped
    command: npm run start:dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: promptlab-frontend
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=http://localhost:3001/api
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - promptlab-network
    restart: unless-stopped
    command: npm start

networks:
  promptlab-network:
    driver: bridge

volumes:
  postgres_data: 