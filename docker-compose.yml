version: '3.8'

services:
  postgres:
    image: postgres:13-alpine
    container_name: promptlab-postgres
    environment:
      POSTGRES_USER: promptlab
      POSTGRES_PASSWORD: promptlab_password
      POSTGRES_DB: promptlab
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/prompt-lab-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U promptlab"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - promptlab-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: promptlab-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://promptlab:promptlab_password@postgres:5432/promptlab
    env_file:
      - ./backend/.env
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - promptlab-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: promptlab-frontend
    depends_on:
      - backend
    env_file:
      - ./frontend/.env
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - promptlab-network
    restart: unless-stopped

networks:
  promptlab-network:
    driver: bridge

volumes:
  postgres_data: 